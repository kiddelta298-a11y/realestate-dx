<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a202c;
      background: #ffffff;
    }
    .header {
      background: #2563eb;
      color: #fff;
      padding: 16px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 700;
    }
    .header p {
      font-size: 11px;
      opacity: 0.85;
      margin-top: 2px;
    }
    .section {
      padding: 16px;
      border-bottom: 1px solid #f1f5f9;
    }
    .section:last-child { border-bottom: none; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      margin-bottom: 10px;
    }
    input:focus { border-color: #2563eb; }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: #2563eb;
      color: #fff;
      transition: background 0.15s;
    }
    .btn:hover { background: #1d4ed8; }
    .status {
      padding: 10px 16px;
      font-size: 12px;
      color: #16a34a;
      background: #f0fdf4;
      display: none;
    }
    .status.error {
      color: #dc2626;
      background: #fef2f2;
    }
    .info {
      font-size: 11px;
      color: #94a3b8;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>不動産DX - 物件取込</h1>
    <p>いいもん「物出し早いもん」連携</p>
  </div>

  <div id="statusBar" class="status"></div>

  <div class="section">
    <label>API接続先</label>
    <input type="text" id="apiBase" placeholder="https://realestate-dx-backend.onrender.com">

    <label>会社ID</label>
    <input type="text" id="companyId" placeholder="UUID">

    <button class="btn" id="saveBtn">設定を保存</button>
  </div>

  <div class="section">
    <p class="info">
      いいもんの「物出し早いもん」ページを開くと、画面右下に取込ボタンが表示されます。
      新着物件一覧を表示した状態で「物件を取込む」をクリックしてください。
    </p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
